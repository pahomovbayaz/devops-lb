version: '3.8'

services:
  app1:
    image: nginx
    volumes:
      - ./app1:/usr/share/nginx/html

  app2:
    image: nginx
    volumes:
      - ./app2:/usr/share/nginx/html

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
