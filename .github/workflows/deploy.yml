name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 185.237.206.54 
          username: devops
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/devops-lb
            git pull
            docker-compose up -d
